name: "Builtins: wait"
cases:
  - name: "wait for specific failed PID"
    known_failure: true # TODO(jobs): wait should return job's exit status
    stdin: |
      (exit 5) &
      pid=$!
      wait $pid
      echo "status: $?"

  - name: "wait for successful PID"
    stdin: |
      (exit 0) &
      pid=$!
      wait $pid
      echo "status: $?"

  - name: "wait in conditional for failed PID"
    known_failure: true # TODO(jobs): wait should return job's exit status
    stdin: |
      (exit 5) &
      pid=$!
      if wait $pid; then
        echo "then"
      else
        echo "else"
      fi

  - name: "wait with no arguments"
    stdin: |
      (exit 0) &
      (exit 0) &
      wait
      echo "after wait all"

  # NOTE: bash announces completed background jobs ("[1]+ Done ...") on *stderr*
  # via its job-control notification cycle. Whether that notice appears for a
  # given run is timing-dependent (it races SIGCHLD delivery against reaching
  # `wait`), so it cannot be compared deterministically. These cases therefore
  # ignore stderr and assert only the deterministic property that motivated the
  # fix: `wait` must not write job status to *stdout*. The stderr notification
  # behavior is covered deterministically by a unit test in brush-core
  # (`jobs::tests`).
  - name: "wait does not write job status to stdout (top-level background job)"
    ignore_stderr: true
    args:
      - "-c"
      - |
        set -m
        echo hello &
        wait
        echo after

  - name: "wait does not write job status to stdout (background jobs in a subshell)"
    ignore_stderr: true
    args:
      - "-c"
      - |
        set -m
        ( for i in 1 2 3; do echo "item-$i" & done; wait ) | sort

  - name: "wait does not write job status to stdout (backgrounded brace group)"
    ignore_stderr: true
    args:
      - "-c"
      - |
        set -m
        { echo grouped; } &
        wait
        echo done

  - name: "wait %job clears the completed job (job control)"
    # Exercises the job-spec (ids) path through the reap; `jobs` must be empty
    # afterward, matching bash. stderr ignored for the same reason as above.
    ignore_stderr: true
    args:
      - "-c"
      - |
        set -m
        sleep 0.1 &
        wait %1
        jobs
        echo done

  - name: "wait %job returns the waited job's exit status"
    # `wait` exits with the status of the job it waited on.
    ignore_stderr: true
    args:
      - "-c"
      - |
        set -m
        ( exit 7 ) &
        wait %1
        echo "status: $?"

  - name: "wait for an unknown job spec returns 127"
    ignore_stderr: true
    args:
      - "-c"
      - |
        set -m
        wait %99
        echo "status: $?"

  - name: "wait clears completed jobs when run from a script file (job control)"
    # Covers the script-file path (a `Script` frame at the call-stack root) -- the
    # same path `-i <script>` takes. Completed jobs must be cleared (not left in
    # the list), matching bash. stderr ignored (job notices are timing-dependent).
    ignore_stderr: true
    test_files:
      - path: "wait_jobs.sh"
        contents: |
          set -m
          sleep 0.1 &
          wait
          jobs
          echo done
    args: ["./wait_jobs.sh"]

  - name: "wait -n not implemented"
    known_failure: true # TODO(builtins): wait -n not implemented
    stdin: |
      (exit 0) &
      (exit 5) &
      wait -n
      echo "first done, status: $?"
      wait -n
      echo "second done, status: $?"

  - name: "Background job failure with wait"
    known_failure: true # TODO(jobs): wait should return job's exit status
    stdin: |
      { sleep 0.01; exit 3; } &
      pid=$!
      wait $pid
      echo "status: $?"

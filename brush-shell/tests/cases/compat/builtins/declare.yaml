name: "Builtins: declare"
common_test_files:
  - path: "helpers.sh"
    contents: |
      stable_print_assoc_array() {
          local -n _arr=$1
          local key

          for key in $(printf "%s\n" "${!_arr[@]}" | sort -n); do
              echo "\"${key}\" => ${_arr[${key}]}"
          done
      }

cases:
  - name: "Display vars"
    stdin: |
      declare myvar=something
      declare -p myvar

  - name: "Display multiple vars"
    stdin: |
      declare var1=value1 var2=value2
      declare -p var1 var2

  - name: "Display all vars"
    stdin: |
      # Test that declare -p works - just check a few specific variables
      declare testvar=something
      declare -p | grep -E "^declare .* testvar="

  - name: "Declare without value"
    stdin: |
      declare myvar
      declare -p myvar

  - name: "Declare readonly var"
    ignore_stderr: true
    stdin: |
      declare -r myvar=something
      declare -p myvar
      myvar=somethingelse

  - name: "Declare readonly var without value"
    stdin: |
      declare -r myvar
      declare -p myvar

  - name: "Declare integer var"
    stdin: |
      declare -i myvar=42
      declare -p myvar

  - name: "Declare integer var without value"
    stdin: |
      declare -i myvar
      declare -p myvar

  - name: "Declare integer var with invalid value"
    ignore_stderr: true
    stdin: |
      declare -i myvar=notanumber
      declare -p myvar

  - name: "Declare array var"
    stdin: |
      declare -a myvar=(1 2 3)
      declare -p myvar

  - name: "Declare array var without value"
    stdin: |
      declare -a myvar
      declare -p myvar

  - name: "Declare associative array var"
    stdin: |
      declare -A myvar=([key1]=val1 [key2]=val2)
      echo "keys (sorted): $(printf '%s\n' "${!myvar[@]}" | sort | tr '\n' ' ')"
      echo "key1: ${myvar[key1]}"
      echo "key2: ${myvar[key2]}"

  - name: "Declare associative array var without value"
    stdin: |
      declare -A myvar
      declare -p myvar

  - name: "Declare exported var"
    stdin: |
      declare -x myvar=something
      declare -p myvar

  - name: "Declare exported var without value"
    stdin: |
      declare -x myvar
      declare -p myvar

  - name: "Declare lowercase var"
    stdin: |
      declare -l myvar=SOMEVALUE
      declare -p myvar
      echo $myvar

  - name: "Declare uppercase var"
    stdin: |
      declare -u myvar=somevalue
      declare -p myvar
      echo $myvar

  - name: "Declare capitalized var"
    stdin: |
      declare -c myvar=somevalue
      declare -p myvar
      echo $myvar

  - name: "Declare array with -a flag"
    stdin: |
      declare -a myvar=([0]=a [1]=b [2]=c)
      declare -p myvar

  - name: "Declare array with compound assignment"
    stdin: |
      declare -a myvar=(a b c)
      declare -p myvar

  - name: "Declare array with sparse indices"
    stdin: |
      declare -a myvar=([0]=a [2]=c)
      declare -p myvar

  - name: "Declare array with append operation"
    stdin: |
      declare -a myvar=(a b)
      myvar+=(c d)
      declare -p myvar

  - name: "Declare array with another append operation"
    stdin: |
      declare -a another=(a b c)
      another+=d
      declare -p another

  - name: "Declare invalid identifiers"
    ignore_stderr: true
    stdin: |
      declare 1=x && echo "Set 1"
      declare @=10 && echo "Set @"

  - name: "Nameref declare -p shows nameref attribute"
    stdin: |
      target="hello"
      declare -n ref=target
      declare -p ref
      declare -p target

  - name: "Nameref declare -n with initial value"
    stdin: |
      target="original"
      declare -n ref=target
      echo "ref: $ref"
      echo "target: $target"

  - name: "Nameref remove attribute with +n"
    stdin: |
      target="value"
      declare -n ref=target
      echo "as nameref: $ref"
      declare +n ref
      echo "after +n: ref=$ref"
      declare -p ref

  - name: "Nameref to array via declare"
    stdin: |
      arr=(one two three)
      declare -n ref=arr
      echo "ref[0]: ${ref[0]}"
      echo "ref[1]: ${ref[1]}"
      echo "ref[@]: ${ref[@]}"
      echo "ref[*]: ${ref[*]}"

  - name: "Nameref array modification via declare"
    stdin: |
      arr=(a b c)
      declare -n ref=arr
      ref[1]="modified"
      echo "arr[1]: ${arr[1]}"
      echo "ref[1]: ${ref[1]}"

  - name: "Nameref to associative array via declare"
    stdin: |
      declare -A assoc=(["key1"]="val1" ["key2"]="val2")
      declare -n ref=assoc
      echo "ref[key1]: ${ref[key1]}"
      echo "ref[key2]: ${ref[key2]}"

  - name: "Nameref array iteration in function via local -n"
    stdin: |
      print_array() {
          local -n arr=$1
          echo "count: ${#arr[@]}"
          for elem in "${arr[@]}"; do
              echo "elem: $elem"
          done
      }

      myarr=(first second third)
      print_array myarr

  - name: "Nameref get keys via declare"
    stdin: |
      declare -A assoc=(["a"]=1 ["b"]=2 ["c"]=3)
      declare -n ref=assoc
      echo "keys (sorted): $(printf '%s\n' ${!ref[@]} | sort | tr '\n' ' ')"
      echo "count: ${#ref[@]}"

  - name: "Nameref array length via declare"
    stdin: |
      arr=(one two three four five)
      declare -n ref=arr
      echo "length: ${#ref[@]}"
      echo "first element length: ${#ref[0]}"

  - name: "Nameref declare -n filter"
    stdin: |
      regular="plain"
      declare -n ref1=regular
      declare -n ref2=regular
      not_a_ref="also plain"
      declare -p -n 2>/dev/null | sort

  - name: "Nameref unset target"
    stdin: |
      target="exists"
      declare -n ref=target
      echo "ref: $ref"
      unset target
      echo "ref after unset: '${ref}'"

  - name: "Assoc array roundtrip via declare -p scalar"
    stdin: |
      declare -A orig=([key1]="val1" [key2]="val2")
      def="$(declare -p orig)"
      declare -A copy="${def#*=}"
      echo "[key1]=${copy[key1]}"
      echo "[key2]=${copy[key2]}"
      echo "count=${#copy[@]}"

  - name: "Assoc array roundtrip via declare -p scalar (local)"
    stdin: |
      f() {
          declare -A orig=([a]="apple" [b]="banana")
          local def="$(declare -p orig)"
          local -A copy="${def#*=}"
          echo "[a]=${copy[a]}"
          echo "[b]=${copy[b]}"
          echo "count=${#copy[@]}"
      }
      f

  - name: "Assoc array roundtrip with special chars in values"
    min_oracle_version: 5.2
    stdin: |
      declare -A orig=([nl]=$'line1\nline2' [sp]="hello world")
      def="$(declare -p orig)"
      declare -A copy="${def#*=}"
      echo "[nl]=${copy[nl]}"
      echo "[sp]=${copy[sp]}"

  - name: "Single-quoted scalar assignment"
    stdin: |
      declare 'x=hello'
      echo "$x"

  - name: "Single-quoted scalar with dollar sign preserved"
    stdin: |
      Y=world
      declare 'x=$Y'
      echo "$x"

  - name: "Double-quoted scalar assignment expands"
    stdin: |
      Y=world
      declare "x=$Y"
      echo "$x"

  - name: "Single-quoted array assignment with -a"
    stdin: |
      declare -a 'arr=(1 2 3)'
      echo "${arr[@]}"
      echo "${#arr[@]}"

  - name: "Single-quoted array assignment with deferred expansion"
    stdin: |
      X="a b"
      declare -a 'arr=(${X})'
      echo "${arr[@]}"
      echo "${#arr[@]}"

  - name: "Single-quoted array assignment with IFS splitting"
    stdin: |
      X="a,b"
      IFS=, declare -a 'arr=(${X})'
      echo "${arr[@]}"
      echo "${#arr[@]}"

  - name: "Single-quoted array assignment without -a is scalar"
    stdin: |
      declare 'arr=(1 2 3)'
      declare -p arr

  - name: "Single-quoted array assignment Gentoo rpm.eclass pattern"
    stdin: |
      RPM_COMPRESS_TYPE="lzma zstd"
      IFS=, declare -a 'types=(${RPM_COMPRESS_TYPE})'
      echo "${types[@]}"
      echo "${#types[@]}"

  - name: "local -a single-quoted array assignment"
    stdin: |
      f() {
        X="a b"
        local -a 'arr=(${X})'
        echo "${arr[@]}"
      }
      f

  - name: "Single-quoted indexed element assignment"
    stdin: |
      declare 'arr[0]=hello'
      declare -p arr

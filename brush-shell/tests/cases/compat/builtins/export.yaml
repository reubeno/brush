name: "Builtins: export"
cases:
  - name: "Basic export usage"
    stdin: |
      MY_TEST_VAR="value"
      echo "Looking for unexported variable..."
      env | grep MY_TEST_VAR

      echo "Exporting and looking for it again..."
      export MY_TEST_VAR
      env | grep MY_TEST_VAR

      echo "Exporting with new value..."
      export MY_TEST_VAR="changed value"
      env | grep MY_TEST_VAR

  - name: "Exporting array"
    stdin: |
      export arr=(a 1 2)
      declare -p arr

  - name: "Unexporting variable"
    stdin: |
      MY_TEST_VAR="value"
      export MY_TEST_VAR="value"
      export -n MY_TEST_VAR

      env | grep MY_TEST_VAR

  - name: "Export with assignment through nameref"
    stdin: |
      declare -n ref=MY_EXPORT_VAR
      export ref="exported_value"
      echo "MY_EXPORT_VAR: $MY_EXPORT_VAR"
      env | grep MY_EXPORT_VAR

  - name: "Export with dynamically-expanded name"
    stdin: |
      var=CC
      export ${var}="dynamic-value"
      echo "CC: $CC"
      env | grep '^CC='

  - name: "Export append with dynamically-expanded name"
    stdin: |
      var=ACC
      ACC="a"
      export ${var}+=":b"
      echo "ACC: $ACC"

  - name: "Export append to existing variable"
    stdin: |
      CFLAGS="-O3 -pipe"
      export CFLAGS+=" -Wno-foo"
      echo "CFLAGS: $CFLAGS"

  - name: "Export append to already-exported variable"
    stdin: |
      export Z="-O3 -pipe"
      export Z+=" -Wno-baz"
      echo "Z: $Z"

  - name: "Export append to unset variable"
    stdin: |
      export NEWVAR+="first"
      echo "NEWVAR: $NEWVAR"

  - name: "Export of invalid identifier via expansion"
    stdin: |
      var="1BAD"
      export ${var}=x 2>/dev/null
      echo "rc=$?"

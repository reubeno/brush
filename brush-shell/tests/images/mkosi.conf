[Distribution]
Distribution=fedora
Release=43

[Output]
OutputDirectory=mkosi.output
CompressOutput=no

[Content]
Packages=systemd
         util-linux
	 dnf5
Autologin=yes
RootPassword=hashed:
RootShell=/usr/bin/brush
WithDocs=no
CleanPackageMetadata=no
RemoveFiles=/usr/share/locale

[Build]
BuildSources=.:,
             ../../../target:brush-target
Environment=BRUSH_PROFILE=release

[Validation]
SecureBoot=no

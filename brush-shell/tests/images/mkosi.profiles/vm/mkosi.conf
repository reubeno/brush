[Output]
Format=disk
ImageId=brush-vm

[Content]
Bootable=yes
Bootloader=systemd-boot
Packages=systemd-udev
         systemd-boot
         kernel-core

KernelCommandLine=console=hvc0
                  quiet
                  systemd.show_status=error

[Runtime]
Firmware=linux
KVM=auto
CPUs=2
RAM=1G
Console=interactive
